services:
  reverse-proxy:
    image: nginx:latest
    container_name: ssnd-reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ../reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../reverse-proxy/conf.d:/etc/nginx/conf.d:ro
      - ../reverse-proxy/logs:/var/log/nginx
    networks:
      ssnd-network:
        ipv4_address: 172.18.0.2

  frontend:
    image: nginx:latest
    container_name: ssnd-frontend
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/src:/usr/share/nginx/html
    networks:
      ssnd-network:
        ipv4_address: 172.18.0.4

  backend:
    build:
      context: ../backend
      dockerfile: ./Dockerfile
    image: ssnd-backend:dev
    container_name: ssnd-backend
    env_file:
      - .env
    environment:
      - PORT=8080
    volumes:
      - ../backend:/app
    working_dir: /app
    command: [ "sh", "/app/entry_point.sh" ]
    networks:
      ssnd-network:
        ipv4_address: 172.18.0.5

  ssnd-db:
    image: postgres:15
    container_name: ssnd-db
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - ../db/data:/var/lib/postgresql/data
    networks:
      ssnd-network:
        ipv4_address: 172.18.0.10

  ssnd-pgadmin:
    image: dpage/pgadmin4
    container_name: ssnd-pgadmin
    env_file:
      - .env
    volumes:
      - ../db/pgadmin:/var/lib/pgadmin
    ports:
      - 8081:80
    depends_on:
      - ssnd-db
    networks:
      ssnd-network:
        ipv4_address: 172.18.0.11

networks:
  ssnd-network:
    name: ssnd
    external: true