server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static server: skúsi nájsť súbor, inak fallback na index.html (SPA pattern)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # (voliteľné) základné cache pre statické assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
}
